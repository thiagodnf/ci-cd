<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nickname Validator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow-sm">
                    <div class="card-body pb-0">

                        <div class="mb-3">
                            <label for="nickname" class="form-label">Nickname</label>
                            <input type="text" id="nickname" class="form-control" placeholder="Type the nickname to validate" autocomplete="off" autofocus>
                        </div>

                        <div class="d-grid mt-3">
                            <button id="checkBtn" class="btn btn-primary">
                                Validate
                            </button>
                        </div>

                        <div id="result" class="small my-3"></div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="./js/index.js"></script>
</body>

</html>
